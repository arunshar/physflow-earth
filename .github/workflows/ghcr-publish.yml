name: Publish CPU reproducibility image to GHCR

# Builds the CPU reproducibility image (docker/Dockerfile.cpu), RUNs it as a
# determinism gate (the test suite must pass inside the container), then pushes
# it to ghcr.io. Auth uses the built-in GITHUB_TOKEN; no personal token needed.

on:
  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.cpu"
      - "src/**"
      - "tests/**"
      - "space/**"
      - "pyproject.toml"
      - ".dockerignore"
      - ".github/workflows/ghcr-publish.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  cpu-repro:
    name: Build, test, and push CPU reproducibility image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build CPU image and load locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cpu
          load: true
          push: false
          tags: ${{ env.IMAGE }}:cpu
      - name: Determinism gate (tests must pass inside the container)
        run: docker run --rm ${{ env.IMAGE }}:cpu
      - name: Push CPU image tags
        run: |
          docker tag ${{ env.IMAGE }}:cpu ${{ env.IMAGE }}:cpu-${{ github.sha }}
          docker push ${{ env.IMAGE }}:cpu
          docker push ${{ env.IMAGE }}:cpu-${{ github.sha }}
      - name: Summary
        run: |
          echo "Published ${{ env.IMAGE }}:cpu and :cpu-${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull: docker pull ${{ env.IMAGE }}:cpu" >> "$GITHUB_STEP_SUMMARY"
